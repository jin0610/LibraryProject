plugins {
    id 'java'
    id 'war'
}

group = 'org.project'
version = '1.0-SNAPSHOT'

repositories {
    mavenCentral()
}

apply plugin: 'war'

dependencies {
    testImplementation("org.springframework:spring-test:5.3.6")
    testImplementation("junit:junit:4.12")

    compileOnly("org.projectlombok:lombok:1.18.22")
    compileOnly("javax.servlet:javax.servlet-api:3.1.0")

                                                                                                  implementation 'org.springframework:spring-beans:5.3.6'
    implementation 'org.springframework:spring-context:5.3.6'
    implementation 'org.springframework:spring-webmvc:5.3.6'

    implementation "com.fasterxml.jackson.core:jackson-core:2.15.2"
    implementation "com.fasterxml.jackson.core:jackson-annotations:2.15.2"
    implementation "com.fasterxml.jackson.core:jackson-databind:2.15.2"

    implementation 'mysql:mysql-connector-java:8.0.32' // MySQL 커넥터 의존성
    implementation 'org.springframework:spring-jdbc:5.3.6' // Spring JDBC

    implementation 'org.springframework:spring-orm:5.3.6'  // Spring ORM 의존성
    implementation 'org.springframework.data:spring-data-jpa:1.11.22.RELEASE'  // Spring Data JPA 의존성
    implementation 'org.hibernate:hibernate-core:5.4.30.Final'  // Hibernate 의존성

    implementation 'javax.servlet:jstl:1.2'  // JSTL 1.2 버전

    implementation 'org.springframework:spring-core:5.3.6'
    implementation 'org.springframework:spring-web:5.3.6'
    implementation 'org.springframework:spring-aop:5.3.6'

    implementation 'com.querydsl:querydsl-jpa:4.4.0'
    annotationProcessor 'com.querydsl:querydsl-apt:4.4.0:jpa'

    implementation 'org.jboss.logging:jboss-logging:3.3.2.Final'

    annotationProcessor 'jakarta.persistence:jakarta.persistence-api:2.2.3'

//    implementation 'jakarta.annotation:jakarta.annotation-api:1.3.5'
    annotationProcessor 'javax.annotation:javax.annotation-api:1.3.2'
    implementation 'javax.annotation:javax.annotation-api:1.3.2'

    // jakarta.annotation-api 충돌 방지
    configurations.all {
        exclude group: 'jakarta.annotation', module: 'jakarta.annotation-api'
    }

    implementation 'org.slf4j:slf4j-api:1.7.30'  // SLF4J API
    implementation 'ch.qos.logback:logback-classic:1.2.3'  // Logback 사용

}

test {
    useJUnitPlatform()
}

tasks.withType(JavaCompile) {
    options.encoding = 'UTF-8'
}

war {
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE  // 중복된 파일을 제외 (하나만 포함)
    from(configurations.runtimeClasspath) {
        into 'WEB-INF/lib'
    }
    webAppDirName = 'src/main/webapp'
}

configurations.all {
    resolutionStrategy {
        force 'org.springframework:spring-core:5.3.6'
        force 'org.springframework:spring-beans:5.3.6'
        force 'org.springframework:spring-context:5.3.6'
        force 'org.springframework:spring-webmvc:5.3.6'

        force "com.fasterxml.jackson.core:jackson-core:2.15.2"
        force "com.fasterxml.jackson.core:jackson-annotations:2.15.2"
        force "com.fasterxml.jackson.core:jackson-databind:2.15.2"

        force 'mysql:mysql-connector-java:8.0.32' // MySQL 커넥터 의존성
        force 'org.springframework:spring-jdbc:5.3.6' // Spring JDBC

        force 'org.springframework:spring-orm:5.3.6'  // Spring ORM 의존성
        force 'org.springframework.data:spring-data-jpa:1.11.22.RELEASE'  // Spring Data JPA 의존성
        force 'org.hibernate:hibernate-core:5.4.30.Final'  // Hibernate 의존성

        force 'javax.servlet:jstl:1.2'  // JSTL 1.2 버전

        force 'org.springframework:spring-web:5.3.6'
        force 'org.springframework:spring-aop:5.3.6'

        force 'org.jboss.logging:jboss-logging:3.3.2.Final'
        force 'org.springframework:spring-tx:5.3.6'

    }
}

//sourceSets {
//    main {
//        java {
//            srcDirs = ['src/main/java', "build/generated/sources/annotationProcessor/java/main"]
//        }
//    }
//}


sourceSets {
    main {
        java {
            srcDirs += 'build/generated/sources/annotationProcessor/java/main'
        }
    }
}


java {
    sourceCompatibility = JavaVersion.VERSION_11
    targetCompatibility = JavaVersion.VERSION_11
}